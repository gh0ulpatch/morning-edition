name: Publish Morning Edition

on:
  schedule:
    # Run at both 06:05 UTC and 07:05 UTC, then check Europe/London in the job.
    # This avoids BST/GMT drift.
    - cron: '5 6 * * *'
    - cron: '5 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decide whether to run now in London time
        id: london_time
        run: |
          HOUR=$(TZ='Europe/London' date +%H)
          if [ "$HOUR" = "07" ]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.london_time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: steps.london_time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip

      - name: Generate Morning Edition
        if: steps.london_time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python scripts/generate_morning_edition.py

      - name: Prepare Pages site
        if: steps.london_time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p site
          cp index.html site/index.html
          cp -r issues site/issues
          if [ -d templates ]; then cp -r templates site/templates; fi

      - name: Configure GitHub Pages
        if: steps.london_time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.london_time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.london_time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v4
