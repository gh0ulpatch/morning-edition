name: Publish Morning Edition

on:
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send a test email using existing data (skips scrape, generate, commit, deploy)'
        type: boolean
        default: false
      force_run:
        description: 'Force a full pipeline run — bypasses the already-published guard'
        type: boolean
        default: false
  schedule:
    # 08:45 UK time year-round, accounting for GMT/BST clock changes:
    #   45 7 * * *  →  08:45 BST  (UTC+1, last Sun Mar – last Sun Oct)
    #   45 8 * * *  →  08:45 GMT  (UTC+0, last Sun Oct – last Sun Mar)
    # Both crons fire every day. The guard step skips the second run
    # if today's issue was already committed by the first.
    - cron: '45 7 * * *'
    - cron: '45 8 * * *'

permissions:
  contents: write   # commit generated files back to the repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for Pages deployment

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Guard ───────────────────────────────────────────────────────────
      # Skip everything if today's issue is already in the repo.
      # This makes the second daily cron a clean no-op.
      - name: Check if already published today
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "ISSUE_DATE=${TODAY}" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.test_email }}" = "true" ]; then
            echo "Test email mode — skipping guard."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "test_only=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "Force run — bypassing guard."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "test_only=false" >> $GITHUB_OUTPUT
          elif [ -f "issues/${TODAY}.html" ]; then
            echo "Already published ${TODAY} — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "test_only=false" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "test_only=false" >> $GITHUB_OUTPUT
          fi

      # ── 3. Python ──────────────────────────────────────────────────────────
      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      # ── 4. Scrape ──────────────────────────────────────────────────────────
      - name: Scrape events
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        run: python scripts/scrape_events.py

      # ── 5. Generate ────────────────────────────────────────────────────────
      # Produces:
      #   issues/{date}.html         full magazine
      #   issues/{date}-digest.html  email digest
      #   tracker.html               cumulative conference table
      #   data/tracker.json          backing store (persists across runs)
      #   index.html                 redirect to latest issue
      - name: Generate Morning Edition
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        run: python scripts/generate_morning_edition.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ── 6. Commit generated files back ─────────────────────────────────────
      # Persists tracker.json and the issue files so that:
      #   • The guard step works correctly on tomorrow's run
      #   • tracker.json accumulates across days
      #   • Issues are browsable in the repo
      - name: Commit generated files
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues/ tracker.html index.html data/
          git diff --staged --quiet || git commit -m "chore: morning edition ${{ env.ISSUE_DATE }} [skip ci]"
          git push

      # ── 7. Upload to SharePoint ────────────────────────────────────────────
      # Upserts every conference in data/tracker.json into a native SharePoint
      # List — one row per conference, deduped by source URL.
      # Required secrets:
      #   SHAREPOINT_TENANT_ID       Azure AD directory (tenant) ID
      #   SHAREPOINT_CLIENT_ID       App registration client ID
      #   SHAREPOINT_CLIENT_SECRET   App registration client secret
      #   SHAREPOINT_SITE_URL        e.g. https://yourorg.sharepoint.com/sites/yoursite
      #   SHAREPOINT_LIST_NAME       List name (created automatically if absent)
      # See scripts/upload_to_sharepoint.py for full Azure AD setup instructions.
      - name: Upload to SharePoint
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        run: python scripts/upload_to_sharepoint.py
        env:
          SHAREPOINT_TENANT_ID:      ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID:      ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET:  ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE_URL:       ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_LIST_NAME:      ${{ secrets.SHAREPOINT_LIST_NAME }}

      # ── 9. Send email via GOV.UK Notify ────────────────────────────────────
      # Required secrets (Settings → Secrets and variables → Actions):
      #   NOTIFY_API_KEY       your Notify API key
      #   NOTIFY_TEMPLATE_ID   template ID from the Notify dashboard
      #   EMAIL_TO             comma-separated recipient addresses
      #
      # To generate the template text to paste into Notify, run locally:
      #   python scripts/send_notify.py --print-template
      - name: Send digest email
        if: steps.guard.outputs.skip != 'true'
        run: python scripts/send_notify.py
        env:
          NOTIFY_API_KEY:      ${{ secrets.NOTIFY_API_KEY }}
          NOTIFY_TEMPLATE_ID:  ${{ secrets.NOTIFY_TEMPLATE_ID }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
          GITHUB_REPOSITORY:   ${{ github.repository }}

      # ── 10. Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Prepare Pages site
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        run: |
          mkdir -p site
          cp index.html   site/index.html
          cp tracker.html site/tracker.html
          cp -r issues    site/issues
          cp -r data      site/data

      - name: Configure GitHub Pages
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        if: steps.guard.outputs.skip != 'true' && steps.guard.outputs.test_only != 'true'
        id: deployment
        uses: actions/deploy-pages@v4
